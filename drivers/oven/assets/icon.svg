  <rect x="50" y="110" width="156" height="12" rx="6" fill="#000"/>
  <!-- Door window -->
  <rect x="50" y="138" width="156" height="78" rx="6" fill="none" stroke="#000" stroke-width="12"/>
  <!-- Heating-element coil -->
  <path d="M 70 158 Q 80 170 90 158 Q 100 146 110 158 Q 120 170 130 158 Q 140 146 150 158 Q 160 170 170 158 Q 180 146 190 158" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
